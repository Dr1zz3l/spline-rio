# x_rio config for OUR quadrotor bags (single radar).
# Base: rio/x_rio/config/x_rio_demo_params.yaml @ dcf0bc9.
# Deviations marked "# CHANGED" + reason (same platform facts as
# ekf_rio_our_platform.yaml: no baro, ~4 s stationary, vibrating frame,
# sparse 13-pt radar clouds with 0.049 m/s Doppler quantization).

# General
frame_id: "odom"
sim_mode: False

# Publishers
publisher_rate: 100            # CHANGED 30: denser estimate stream for RMSE eval only
pose_path_publisher_rate: 5

# Subscribers
topic_imu: "/sensor_platform/imu"
topic_baro_altimeter: "/sensor_platform/baro"
topic_radar_scan: "/sensor_platform/radar/scan"
topic_radar_trigger: "/sensor_platform/radar/trigger"

# Rosbag mode
republish_ground_truth: True
topic_ground_truth_pose: "/ground_truth/pose"
topic_ground_truth_twist: "/ground_truth/twist"
topic_ground_truth_twist_body: "/ground_truth/twist_body"

# KF Updates
altimeter_update: False        # CHANGED: no barometer on our platform
radar_update: True
radar_yaw_update: False        # set via launch arg for the yaw-aided variant
sigma_altimeter: 5.0
sigma_b_alt: 0

# Radar Measurement Model
outlier_percentil_radar: 0.05
use_w: True
use_reduced_radar_clone: False
use_diagonal_noise: False
estimated_extrinsics_error_att: False

# Radar Ego Velocity Estimation
min_dist: 0.5
max_dist: 100
min_db: 3
elevation_thresh_deg: 45
filter_min_z: -1
filter_max_z: 1
azimuth_thresh_deg: 60
radar_velocity_correction_factor: 1.0

thresh_median_zero_velocity: 0.06   # CHANGED 0.05: Doppler quantization bin is 0.049 m/s
allowed_outlier_percentage: 0.25
sigma_zero_velocity_x: 0.05         # CHANGED 0.025: >= one quantization bin
sigma_zero_velocity_y: 0.05
sigma_zero_velocity_z: 0.05

sigma_offset_radar_x: 0.05
sigma_offset_radar_y: 0.05
sigma_offset_radar_z: 0.05

max_sigma_x: 0.25
max_sigma_y: 0.25
max_sigma_z: 0.25
max_r_cond: 1.0e3
use_cholesky_instead_of_bdcsvd: True

use_ransac: True
outlier_prob: 0.5
success_prob: 0.99999
N_ransac_points: 3
inlier_thresh: 0.15

use_odr: True
min_speed_odr: 4.0
sigma_v_r: 0.125
model_noise_offset_deg: 2.0
model_noise_scale_deg: 10.0

# radar yaw (Manhattan-world aiding; only used when radar_yaw_update=true)
yaw_aiding_min_snr_detection: 5
yaw_aiding_min_dist: 0.25
yaw_aiding_max_dist: 3
yaw_aiding_ele_thresh_deg: 10
yaw_aiding_min_v_xy: 0.25
yaw_aiding_N_init: 300
yaw_aiding_min_N_peak: 60
yaw_aiding_N_gaussian: 21
yaw_aiding_gaussian_sigma: 3
yaw_aiding_init_inlier_thresh_deg: 2.0
yaw_aiding_yaw_inlier_thresh_deg: 50.0
outlier_percentil_radar_yaw: 0.5
sigma_radar_yaw_deg: 3

# Initialization
T_init: 3                      # CHANGED 10: our bags are only stationary ~4 s before takeoff
calib_gyro: true
g_n: 9.81

p_0_x: 0
p_0_y: 0
p_0_z: 0
v_0_x: 0
v_0_y: 0
v_0_z: 0
yaw_0_deg: 0
b_0_a_x: 0
b_0_a_y: 0
b_0_a_z: 0
b_0_w_x_deg: 0
b_0_w_y_deg: 0
b_0_w_z_deg: 0
b_0_alt: 0

# Initial Uncertainty
sigma_p: 0
sigma_v: 0.1                   # CHANGED 0: zero makes radar gain exactly zero at start
sigma_roll_pitch_deg: 3        # CHANGED 2: accel-tilt init on a vibrating armed quad
sigma_yaw_deg: 3               # CHANGED 0
sigma_b_a: 0.1
sigma_b_w_deg: 0.05            # CHANGED 3e-6: idle-vs-flight gyro-mean shifts >> 3e-6
sigma_l_b_r_x: 0.0151
sigma_l_b_r_y: 0.0151
sigma_l_b_r_z: 0.0151
sigma_eul_b_r_roll_deg: 0.15
sigma_eul_b_r_pitch_deg: 0.15
sigma_eul_b_r_yaw_deg: 0.15

# Noise PSDs
noise_psd_a: 0.03
noise_psd_w_deg: 1.0           # CHANGED 0.2: measured 2.1 deg/s/sqrt(Hz) on x during
                               # flight (vibration); reconfigure clamps at 1.0
noise_psd_b_a: 0.0001          # CHANGED 1e-5: mild bias walk
noise_psd_b_w_deg: 0.001       # CHANGED 5e-6: same
noise_psd_b_alt: 0.00001

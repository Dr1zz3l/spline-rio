# ekf_rio config for OUR quadrotor bags (slow/fast racing, backflips).
# Base: rio/ekf_rio/config/ekf_rio_default.yaml @ dcf0bc9.
# Every deviation from the default is marked with "# CHANGED" + reason.
# Tuning policy (baselines/README.md): only platform facts (topics, init
# window, no baro) and radar noise parameters may differ from their defaults.

# General
frame_id: "odom"

# Publishers
publisher_rate: 100            # CHANGED 30 -> 100: denser estimate stream for RMSE eval only
pose_path_publisher_rate: 5

# Subscribers (match baselines/adapters/convert_bag_to_rio.py output)
topic_imu: "/sensor_platform/imu"
topic_baro_altimeter: "/sensor_platform/baro"
topic_radar_scan: "/sensor_platform/radar/scan"
topic_radar_trigger: "/sensor_platform/radar/trigger"

# Rosbag mode --> used by rosbag node
republish_ground_truth: True
topic_ground_truth_pose: "/ground_truth/pose"
topic_ground_truth_twist: "/ground_truth/twist"
topic_ground_truth_twist_body: "/ground_truth/twist_body"

# KF Updates
altimeter_update: False        # CHANGED True -> False: our platform has no barometer
sigma_altimeter: 5.0

radar_update: True

# Radar Measurement Model
outlier_percentil_radar: 0.05
use_w: True

## radar ego velocity estimation
# filtering
min_dist: 0.25
max_dist: 100
min_db: 3
elevation_thresh_deg: 60
azimuth_thresh_deg: 60
radar_velocity_correction_factor: 1.0
filter_min_z: -3
filter_max_z: 3

# zero velocity detection
thresh_zero_velocity: 0.06     # CHANGED 0.05: our Doppler quantization is 0.049 m/s —
                               # one-bin detections sit exactly at the default threshold
allowed_outlier_percentage: 0.25
sigma_zero_velocity_x: 0.05    # CHANGED 0.025: >= one quantization bin (0.049 m/s)
sigma_zero_velocity_y: 0.05
sigma_zero_velocity_z: 0.05

# result filtering
max_sigma_x: 0.2
max_sigma_y: 0.2
max_sigma_z: 0.2
max_r_cond: 1.0e3
use_cholesky_instead_of_bdcsvd: True

# RANSAC parameters
use_ransac: True
outlier_prob: 0.4
success_prob: 0.9999
N_ransac_points: 3
inlier_thresh: 0.15

# noise offset
sigma_offset_radar_x: 0.05
sigma_offset_radar_y: 0.025
sigma_offset_radar_z: 0.05

# ODR refinement
use_odr: True
min_speed_odr: 4.0
sigma_v_r: 0.125
model_noise_offset_deg: 2.0
model_noise_scale_deg: 10.0

# Initialization
T_init: 3                      # CHANGED 10 -> 3: our bags are only stationary for ~4 s
                               # before takeoff (mocap-verified; z starts rising at t=4 s)
calib_gyro: true
g_n: 9.81

p_0_x: 0
p_0_y: 0
p_0_z: 0

v_0_x: 0
v_0_y: 0
v_0_z: 0

yaw_0_deg: 0

b_0_a_x: 0
b_0_a_y: 0
b_0_a_z: 0

b_0_w_x_deg: 0
b_0_w_y_deg: 0
b_0_w_z_deg: 0

b_0_alt: 0

# Initial Uncertainty
# CHANGED from all-zero defaults: zero initial sigma makes the Kalman gain
# exactly zero for v/attitude and lets the chi^2 gate reject every radar
# update once vibration-driven propagation error exceeds R (observed:
# ~all of ~560 updates rejected -> pure dead reckoning -> km-scale blowup).
# Values reflect honest init uncertainty on our platform (accel-tilt init
# on a vibrating, armed quad; T_init=3 s).
sigma_p: 0
sigma_v: 0.1
sigma_roll_pitch_deg: 3
sigma_yaw_deg: 3
sigma_b_a: 0.1                 # CHANGED 0.02: measured accel biases up to 0.25 m/s^2 (vs mocap attitude)
sigma_b_w_deg: 0.05            # CHANGED 3e-6: idle-vs-flight gyro-mean shifts >> 3e-6 deg/s
sigma_b_alt: 0.1

sigma_l_b_r_x: 0.01
sigma_l_b_r_y: 0.01
sigma_l_b_r_z: 0.01
sigma_eul_b_r_roll_deg: 0.25
sigma_eul_b_r_pitch_deg: 0.25
sigma_eul_b_r_yaw_deg: 0.25

# Noise PSDs
noise_psd_a: 0.03
noise_psd_w_deg: 1.0           # CHANGED 0.2 -> 1.0: measured white-noise PSD of our
                               # gyro during flight is 2.1 deg/s/sqrt(Hz) on x (frame
                               # vibration; idle-rotor rest 1.3); rio's reconfigure
                               # range clamps this parameter at 1.0 -> use the max.
                               # Their default assumes a 10x quieter IMU; overconfident
                               # P makes the chi^2 gate reject all radar updates.
noise_psd_b_a: 0.0001          # CHANGED 1e-5 -> 1e-4: mild bias walk (1e-3 made biases a
                               # trash-can: b_a_y hit -2.5 m/s^2 in 9 s, then numeric blowup)
noise_psd_b_w_deg: 0.001       # CHANGED 1e-5 -> 1e-3: same rationale, gentler
noise_psd_b_alt: 0.000001

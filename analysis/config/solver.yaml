# B-spline parameterization
bspline_degree: 5          # Quintic for continuous snap
dt_pos: 0.05               # Knot spacing for position spline (seconds)
dt_ori: 0.05               # Knot spacing for orientation spline (seconds)

# Radar
huber_delta: 1.0           # Huber threshold (m/s); must be >= 0.63 m/s Doppler bin size
min_range: 0.2             # Minimum range filter (m)
# v_max moved to config/bags.yaml radar_config (per-bag: 4.99 for default, 3.84 for best_velocity bags)

# IMU weights
lambda_accel: 0.01
lambda_gyro: 1.0
huber_delta_accel: 2.0     # Huber threshold for accelerometer (m/s²); clips spikes linearly

# Regularization
lambda_snap_pos: 0.0001    # Position minimum-snap weight
lambda_snap_ori: 0.0001    # Orientation minimum-snap weight
lambda_ori_reg: 0.0        # Orientation regularization (penalizes delta CPs away from MoCap); disabled

# Bias priors
lambda_bias_prior: 1.0     # Fallback (overridden by per-sensor values below)
lambda_bias_prior_accel: 1000.0   # Strong: prevents gravity leakage into accel bias
lambda_bias_prior_gyro: 10000.0   # Very strong: MEMS gyro z-bias ~0.18-0.28 rad/s confirmed
use_stationary_bias: true  # Use variance-based stationary detection for bias initialization
lock_biases: false         # Lock biases to initial values (stationary-detected or zero)

# Boundary priors (pin spline state at trajectory START to MoCap ground truth)
boundary_window: 1         # Seconds near start to apply boundary priors
lambda_boundary_vel: 1000.0
lambda_boundary_pos: 1000.0
lambda_boundary_ori: 10000.0
lambda_boundary_accel: 0.001
lambda_boundary_gyro: 1000.0

# Optimizer
max_iterations: 20
relinearize_threshold_deg: 1.0   # Re-linearize SO(3) spline when max|delta| exceeds this
use_phase2_init: false             # Initialize position from Phase 2 linear solver

# Extrinsics (radar-to-body)
lock_extrinsics: true      # Lock radar extrinsics to config/extrinsics.yaml values
optimize_pitch_only: true  # Only optimize pitch extrinsic; roll/yaw unobservable
lambda_extrinsic_prior: 1.0

# Radar-to-body extrinsics
# Body frame: x=forward, y=left, z=up
# rotation_euler_deg: [roll, pitch, yaw] in degrees
rotation_euler_deg: [180.0, 30.0, 0.0]   # 180 deg roll, 30 deg down-pitch, no yaw (confirmed correct)
translation_body_m: [0.08, 0.02, -0.01]   # 2 cm left (+y), 1 cm down (-z) (confirmed correct)

# Time offsets
imu_mocap_offset_sec: 0.020
radar_imu_offset_sec: -0.019

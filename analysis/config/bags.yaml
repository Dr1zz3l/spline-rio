bags:
  original:     rosbags/2025-12-17-16-02-22.bag
  circle:       rosbags/circle_2025-12-17-17-21-37.bag
  circle_fast:  rosbags/circle_fast_2025-12-17-17-25-34.bag
  circle_fwd:   rosbags/circle_forward_2025-12-17-17-37-38.bag
  loopings:     rosbags/circle_fast_forward_2025-12-17-17-39-49.bag
  backflips:    rosbags/backflips_2025-12-17-17-41-24.bag
  backflips_best_velocity:                  rosbags/Wed_11032026_1503/backflip_oldconfig_2026-03-11-16-40-51.bag
  circle_best_velocity:                     rosbags/Wed_11032026_1503/circle_5mps_oldconfig_2026-03-11-16-38-36.bag
  fast_racing_best_velocity_no_clustering:  rosbags/Wed_11032026_1503/fast_racing_2026-03-11-15-19-58.bag
  fast_racing_best_velocity:                rosbags/Wed_11032026_1503/fastracing_oldconfig_2026-03-11-17-20-18.bag
  slow_racing_best_velocity:                rosbags/Wed_11032026_1503/slowracing_oldconfig_2026-03-11-17-18-43.bag

# Per-bag solver parameter overrides. Applied after solver_cpp.yaml, before --set.
# Use for bags that need different spline configs (e.g. backflips need dense ori knots).
solver_overrides:
  backflips_best_velocity:
    lock_extrinsics: 1   # extrinsic pitch drifts on backflips (orientation model error acts as surrogate)

radar_config:
  default:
    v_max: 4.99
    doppler_resolution: 0.63
  best_velocity:
    # Visualizer cfg comment says 3.84 m/s but that is wrong.
    # Empirically confirmed: V_MAX = 3.00 m/s
    #   - Aliased cluster mean collapses to +0.05 m/s (from +0.46 m/s at V_MAX=3.84)
    #   - Fine sweep flat below 3.00 — noise-limited, not calibration-limited
    #   - Quantization bin 0.049 m/s (Doppler resolution confirmed; N_bins may be asymmetric)
    #   - cfarFovCfg ±3.20 m/s: consistent with sensor output within [-3.00, +3.00]
    v_max: 3.136
    doppler_resolution: 0.049

flipped:
  - circle
  # - circle_fwd
  - loopings
  # - backflips
  # - slow_racing_best_velocity
  # - fast_racing_best_velocity

# (start_offset_sec, duration_sec) for each named flight window
timing:
  circle:                                   [25.5, 8.5]
  circle_fast:                              [14.5, 8.5]
  circle_fwd:                               [28.0, 8.0]
  loopings:                                 [9.5,  8.5]
  backflips:                                [26.5, 15.0]
  backflips_best_velocity:                  [23.6, 18.1]
  circle_best_velocity:                     [22.2, 8.4]
  fast_racing_best_velocity_no_clustering:  [16.9, 10.0]
  fast_racing_best_velocity:                [18.1, 18.0]
  slow_racing_best_velocity:                [18.1, 25.8]# 25.8]
# Per-bag solver parameter overrides. Applied after solver_cpp.yaml, before --set.
# Use for bags that need different spline configs (e.g. backflips need dense ori knots).
# Per-bag extrinsics overrides (time offsets are per-DAY calibration).
# Dec-2025 bags: validate_physics cross-correlation gives radar_imu_offset
# ≈ 0.073 s and imu_mocap_offset ≈ 0.020 s (vs 0.135 / 0.015 calibrated on
# the Mar-2026 day). At backflip rates (10 rad/s) the 60 ms error injects
# ~35° of orientation error into every radar factor.
extrinsics_overrides:
  backflips:
    radar_imu_offset_sec: 0.0733
    imu_mocap_offset_sec: 0.0200
  # backflips_best_velocity: TESTED radar_imu_offset_sec=0.1067 (this bag's
  # cross-corr best fit, vs global 0.135) — REVERTED: position degraded
  # 2.06→2.79 m, ori ~par (9.56→9.35 live). Cross-corr offset estimates
  # scatter ±20-30 ms on aggressive bags (slow_racing fits 0.148, this bag
  # 0.107, same day). Offset refinement needs in-solver joint estimation
  # (t_d parameter), not config tweaks. See ROADMAP.md.

solver_overrides:
  slow_racing_best_velocity:
    marg_prior_scale: 1.0e-7  # near-zero prior: windows self-sufficient; improves live ori/vel/pos
                               # cliff at 1e-6 (harmful regime) vs 1e-7 (free adaptation, best live)
                               # tradeoff: settled vel 0.154→0.904 m/s (eval artifact, not deployment issue)
  backflips_best_velocity:
    # --- BATCH config (default when --sliding-window is NOT used) ---
    dt_ori: 0.0008       # 10x denser: needed for batch convergence at fine scale; SW solver stays near P1-P3 init
    dt_pos: 0.010        # coarser position: compensates for increased solve time from dense ori knots
    lock_extrinsics: 1   # extrinsic pitch drifts on backflips (orientation model error acts as surrogate)
    lock_gyro_bias: 1    # E1: post-solve gyro clamp; rank-deficient windows let bias run away to >1 rad/s
    lambda_heading: 10.0 # E2: stronger pseudo-magnetometer; absolute yaw anchor through the flip
    marg_prior_scale: 0.0  # E3: disable marg prior; S is rank-deficient (stride zone: 375 ori knots vs ~300 gyro)
    # --- SW (Phase 3) config — use --set flags to override from CLI ---
    # python validate_live_solver.py backflips_best_velocity --mocap-yaw --cpp --sliding-window \
    #   --set dt_ori=0.008 --set lambda_ori_accel=0.001 --set lock_gyro_bias=0 \
    #   --set marg_prior_scale=0.0 --set lambda_pos_init_prior=1000.0
    # Rationale: dt_ori=0.008 (well-conditioned Jacobian, ori converges to ~10°);
    # lambda_pos_init_prior=1000 anchors each CP to P1-P3 radar-velocity init
    # to prevent position blowup from sparse radar (~10 Hz per window).
    # Result: settled 2.56m / 10.87°, live 3.33m / 9.33°
    # Batch ceiling: 1.82m / 8.31°  (gap: +0.74m pos, +2.56° ori)

radar_config:
  default:
    v_max: 4.99
    doppler_resolution: 0.63
  best_velocity:
    # Visualizer cfg comment says 3.84 m/s but that is wrong.
    # Empirically confirmed: V_MAX = 3.00 m/s
    #   - Aliased cluster mean collapses to +0.05 m/s (from +0.46 m/s at V_MAX=3.84)
    #   - Fine sweep flat below 3.00 — noise-limited, not calibration-limited
    #   - Quantization bin 0.049 m/s (Doppler resolution confirmed; N_bins may be asymmetric)
    #   - cfarFovCfg ±3.20 m/s: consistent with sensor output within [-3.00, +3.00]
    v_max: 3.136
    doppler_resolution: 0.049

